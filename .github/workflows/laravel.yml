name: Laravel

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  laravel-tests:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, bcmath, sqlite
        coverage: none

    - name: Copy .env (optional)
      run: |
        if [ -f .env.example ]; then
          cp .env.example .env
        else
          echo ".env.example no existe, se omite"
        fi

    - name: Install Dependencies (optional)
      run: |
        if [ -f composer.json ]; then
          composer install --no-interaction --prefer-dist --optimize-autoloader
        else
          echo "No hay composer.json, se omite"
        fi

    - name: Generate key (optional)
      run: |
        if [ -f artisan ]; then
          php artisan key:generate
        else
          echo "No es un proyecto Laravel completo, se omite key:generate"
        fi

    - name: Set Permissions
      run: chmod -R 777 storage bootstrap/cache || true

    - name: Create Database
      run: |
        mkdir -p database
        touch database/database.sqlite

    - name: Run Tests (optional)
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: |
        if [ -f artisan ]; then
          php artisan test
        else
          echo "No hay tests de Laravel, se omite"
        fi